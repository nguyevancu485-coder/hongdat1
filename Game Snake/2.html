<!DOCTYPE html>
<html lang="vi">
<head>

<meta charset="UTF-8">
<title>Snake</title>

<link rel="stylesheet" href="2.css">

</head>

<body>

<div id="game-container">

<div id="top-bar">

<div id="score">SCORE: 000</div>

<div id="level">LEVEL: 01</div>

<div id="lives">❤️❤️❤️</div>

</div>

<div id="game-board"></div>

</div>

<div id="game-over">

<h1>Chưa Tày Đâu</h1>

<button onclick="restartGame()">Chơi lại</button>

<title>Nút quay lại trang chủ</title>
  <style>
    .home-button {
  position: fixed;   /* hoặc absolute */
  top: 20px;
  left: 20px;

  padding: 10px 18px;
  background: #1e73d8;
  color: white;
  border-radius: 8px;
  text-decoration: none;
  font-size: 14px;
  transition: 0.3s;
}

.home-button:hover {
  background: #155ab6;
}
  </style>

</div>

<script src="snake.js"></script>
<button onclick="window.history.back()" class="home-button">
    ← Quay lại
  </button>
</body>
</html>
